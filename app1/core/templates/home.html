<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — App 1 (SSO Platform)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff}
        nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px)}
        .nav-brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
        .nav-brand span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-right{display:flex;align-items:center;gap:20px}
        .nav-user{color:rgba(255,255,255,.7);font-size:14px}
        .btn-logout{padding:8px 20px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#fca5a5;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .3s}
        .btn-logout:hover{background:rgba(239,68,68,.25);transform:translateY(-1px)}
        .main{max-width:900px;margin:60px auto;padding:0 20px}
        .welcome{margin-bottom:40px;animation:slideUp .6s ease-out}
        .welcome h1{font-size:32px;font-weight:700;margin-bottom:8px}
        .welcome h1 span{background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome p{color:rgba(255,255,255,.5);font-size:16px}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:40px}
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;transition:all .3s;animation:slideUp .6s ease-out}
        .card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15);box-shadow:0 15px 40px rgba(0,0,0,.2)}
        .card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
        .card-icon.blue{background:rgba(102,126,234,.2);box-shadow:0 4px 12px rgba(102,126,234,.2)}
        .card-icon.purple{background:rgba(118,75,162,.2);box-shadow:0 4px 12px rgba(118,75,162,.2)}
        .card-icon.green{background:rgba(52,211,153,.2);box-shadow:0 4px 12px rgba(52,211,153,.2)}
        .card h3{font-size:16px;font-weight:600;margin-bottom:6px}
        .card p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.5}
        .sso-banner{background:linear-gradient(135deg,rgba(102,126,234,.15),rgba(118,75,162,.15));border:1px solid rgba(102,126,234,.2);border-radius:20px;padding:28px;display:flex;align-items:center;justify-content:space-between;gap:20px;animation:slideUp .6s ease-out .2s both}
        .sso-banner .text h3{font-size:18px;margin-bottom:6px}
        .sso-banner .text p{color:rgba(255,255,255,.5);font-size:14px}
        .btn-app2{padding:12px 28px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;text-decoration:none;transition:all .3s;white-space:nowrap}
        .btn-app2:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .badge{display:inline-block;padding:4px 10px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:#34d399;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">🔐 <span>SSO Platform</span> <span class="badge">App 1</span></div>
        <div class="nav-right">
            <span class="nav-user">👤 {{ username }}</span>
            <a href="/logout/" class="btn-logout" id="btn-logout">Sign Out</a>
        </div>
    </nav>
    <div class="main">
        <div class="welcome">
            <h1>Hello, <span>{{ username }}</span>! 👋</h1>
            <p>Welcome to your dashboard. You are logged in via SSO.</p>
        </div>
        <div class="sso-banner">
            <div class="text">
                <h3>🚀 Test Single Sign-On</h3>
                <p>Open App 2 in a new tab — you'll be auto-logged in via SSO cookie!</p>
            </div>
            <a href="{{ app2_url }}" target="_blank" class="btn-app2" id="btn-open-app2">Open App 2 →</a>
        </div>
    </div>
</body>
</html>
