<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SSO Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);position:relative;overflow-x:hidden;padding:40px 20px;}
        body::before{content:'';position:absolute;width:400px;height:400px;background:#764ba2;border-radius:50%;filter:blur(80px);opacity:.3;top:-100px;right:-100px;animation:float 8s ease-in-out infinite}
        body::after{content:'';position:absolute;width:350px;height:350px;background:#667eea;border-radius:50%;filter:blur(80px);opacity:.3;bottom:-80px;left:-80px;animation:float 8s ease-in-out infinite 4s}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
        .card{position:relative;z-index:1;width:100%;max-width:440px;}
        .inner{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px 40px;box-shadow:0 25px 60px rgba(0,0,0,.3);animation:slideUp .6s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .logo{text-align:center;margin-bottom:32px}
        .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#764ba2,#f093fb);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:24px;box-shadow:0 8px 20px rgba(118,75,162,.4)}
        .logo h1{color:#fff;font-size:24px;font-weight:700}
        .logo p{color:rgba(255,255,255,.5);font-size:14px;margin-top:4px}
        .error-msg{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:20px;text-align:center}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
        .form-group input{width:100%;padding:14px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;transition:all .3s;outline:none}
        .form-group input:focus{border-color:#764ba2;background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(118,75,162,.15)}
        .form-group input::placeholder{color:rgba(255,255,255,.3)}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#764ba2,#f093fb);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;margin-top:8px}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(118,75,162,.4)}
        .link{text-align:center;margin-top:28px;color:rgba(255,255,255,.5);font-size:14px}
        .link a{color:#b794f4;text-decoration:none;font-weight:600}
        .link a:hover{color:#d6bcfa}
    </style>
</head>
<body>
    <div class="card"><div class="inner">
        <div class="logo">
            <div class="logo-icon">✨</div>
            <h1>Create Account</h1>
            <p>Join the SSO Platform</p>
        </div>
        {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
        <form method="POST" action="/register/">
            {% csrf_token %}
            <div class="form-group"><label for="username">Username</label><input type="text" id="username" name="username" placeholder="Choose a username" required></div>
            <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" placeholder="Enter your email" required></div>
            <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" placeholder="Create a password" required></div>
            <div class="form-group"><label for="confirm_password">Confirm Password</label><input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required></div>
            <button type="submit" class="btn" id="btn-register">Create Account</button>
        </form>
        <div class="link">Already have an account? <a href="/login/">Sign in</a></div>
    </div></div>
</body>
</html>
