<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — App 2 (SSO Platform)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff}
        nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px)}
        .nav-brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
        .nav-brand span{background:linear-gradient(135deg,#e94560,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-right{display:flex;align-items:center;gap:20px}
        .nav-user{color:rgba(255,255,255,.7);font-size:14px}
        .btn-back{padding:8px 20px;background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);border-radius:10px;color:#93aafd;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .3s}
        .btn-back:hover{background:rgba(102,126,234,.25);transform:translateY(-1px)}
        .main{max-width:900px;margin:60px auto;padding:0 20px}
        .welcome{margin-bottom:40px;animation:slideUp .6s ease-out}
        .welcome h1{font-size:32px;font-weight:700;margin-bottom:8px}
        .welcome h1 span{background:linear-gradient(135deg,#e94560,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome p{color:rgba(255,255,255,.5);font-size:16px}
        .sso-status{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:28px;margin-bottom:30px;display:flex;align-items:center;gap:16px;animation:slideUp .6s ease-out}
        .status-dot{width:12px;height:12px;background:#34d399;border-radius:50%;box-shadow:0 0 12px rgba(52,211,153,.5);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(52,211,153,.5)}50%{box-shadow:0 0 24px rgba(52,211,153,.8)}}
        .status-text h3{font-size:16px;margin-bottom:2px}
        .status-text p{color:rgba(255,255,255,.5);font-size:13px}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;transition:all .3s;animation:slideUp .6s ease-out}
        .card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15);box-shadow:0 15px 40px rgba(0,0,0,.2)}
        .card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
        .card-icon.red{background:rgba(233,69,96,.2);box-shadow:0 4px 12px rgba(233,69,96,.2)}
        .card-icon.blue{background:rgba(102,126,234,.2);box-shadow:0 4px 12px rgba(102,126,234,.2)}
        .card-icon.teal{background:rgba(45,212,191,.2);box-shadow:0 4px 12px rgba(45,212,191,.2)}
        .card h3{font-size:16px;font-weight:600;margin-bottom:6px}
        .card p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.5}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .badge{display:inline-block;padding:4px 10px;background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);border-radius:6px;color:#e94560;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">🌐 <span>SSO Platform</span> <span class="badge">App 2</span></div>
        <div class="nav-right">
            <span class="nav-user">👤 {{ username }}</span>
            <a href="{{ app1_url }}" class="btn-back">← Back to App 1</a>
        </div>
    </nav>
    <div class="main">
        <div class="welcome">
            <h1>Welcome to <span>App 2</span>! 🎉</h1>
            <p>You were auto-logged in via SSO — no credentials needed!</p>
        </div>
        <div class="sso-status">
            <div class="status-dot"></div>
            <div class="status-text">
                <h3>✅ SSO Session Active</h3>
                <p>Authenticated as <strong>{{ username }}</strong> ({{ email }}) — Token validated by Auth Service</p>
            </div>
        </div>
    </div>
</body>
</html>
