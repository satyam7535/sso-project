# This is a template Nginx configuration file.
# The deploy.sh script will customize the proxy_pass port based on the service being deployed.

server {
    listen 80;
    server_name _; # Change this to your domain name in production

    location / {
        # The port will be updated dynamically by deploy.sh:
        # 8000 for auth_service
        # 8001 for app1
        # 8002 for app2
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        # This will be replaced by deploy.sh with the actual static files directory
        alias /home/ubuntu/project/staticfiles/;
    }
}
